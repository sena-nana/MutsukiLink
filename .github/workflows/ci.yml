name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo check --workspace --all-targets --all-features
      - run: cargo test --workspace --all-targets --all-features
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  boundaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: bash scripts/check-boundaries.sh

  mobile-compile:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: aarch64-linux-android
          - os: macos-latest
            target: aarch64-apple-ios
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo check -p mutsuki-link-core --target ${{ matrix.target }} --no-default-features
      - run: cargo check -p mutsuki-link-pairing --target ${{ matrix.target }} --no-default-features
      - run: cargo check -p mutsuki-link --target ${{ matrix.target }} --no-default-features --features pairing

  release-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: python3 scripts/run-performance-model.py --mode smoke --output target/mutsuki-benchmarks/link-smoke.json
      - uses: actions/upload-artifact@v4
        with:
          name: link-performance-smoke
          path: |
            target/mutsuki-benchmarks/link-smoke.json
            target/mutsuki-benchmarks/link-smoke.analysis.json
      - run: cargo run --release -p mutsuki-link --example compact_data_baseline
      - run: cargo package -p mutsuki-link-core --allow-dirty
      - run: cargo package -p mutsuki-link --allow-dirty --list
      - run: cargo package -p ntp-mutsuki-link --allow-dirty --list

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - run: cargo check -p mutsuki-link-core --no-default-features
      - run: cargo check -p mutsuki-link --no-default-features
      - run: cargo check --workspace --lib --all-features
